name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy --component rustfmt

      - name: Use Rust 1.94.1
        run: rustup default 1.94.1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal

      - name: Use Rust 1.94.1
        run: rustup default 1.94.1

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ash" "dist/ash"
          chmod 0755 "dist/ash"
          tar -C dist -czf "ash-${{ matrix.name }}.tar.gz" ash
          shasum -a 256 "ash-${{ matrix.name }}.tar.gz" > "ash-${{ matrix.name }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ash-${{ matrix.name }}
          path: |
            ash-${{ matrix.name }}.tar.gz
            ash-${{ matrix.name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
